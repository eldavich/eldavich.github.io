<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Chapín | Perfil Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de colores para Modo Claro y Oscuro automático */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-color: #3b82f6;
                --accent-hover: #60a5fa;
                --border-color: #334155;
                --input-bg: #0f172a;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        .profile-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            text-align: center;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* Avatar / Foto ficticia moderna */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #ec4899);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 24px;
        }

        /* Redes Sociales */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .social-icon {
            color: var(--text-muted);
            font-size: 1.4rem;
            transition: color 0.2s ease, transform 0.2s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 24px 0;
        }

        /* Formulario de Contacto */
        .contact-section h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: var(--text-main);
            text-align: left;
        }

        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background-color: var(--accent-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Datos Básicos Pie */
        .footer-info {
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="avatar">DC</div>
        
        <h1>David Chapín</h1>
        <p class="tagline">Especialista Digital & Perfil Profesional</p>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/soydavidchapin/" target="_blank" class="social-icon" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://x.com/davidchapin" target="_blank" class="social-icon" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/chapindavid/" target="_blank" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/davidchapin" target="_blank" class="social-icon" title="Facebook"><i class="fab fa-facebook"></i></a>
        </div>

        <hr>

        <div class="contact-section">
            <h2>Enviar un mensaje</h2>
            <form action="https://formsubmit.co/david@chapin.es" method="POST">
                
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://david.chapin.es">

                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Email de contacto</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" placeholder="¿En qué puedo ayudarte?" required></textarea>
                </div>

                <button type="submit">Enviar Mensaje</button>
            </form>
        </div>

        <hr>

        <div class="footer-info">
            <p><i class="fas fa-envelope"></i> david@chapin.es</p>
            <p><i class="fas fa-globe"></i> david.chapin.es</p>
            <p style="margin-top: 10px; font-size: 0.75rem;">© 2026 David Chapín. Todos los derechos reservados.</p>
        </div>
    </div>

</body>
</html>
