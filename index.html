<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Chapín | Gestión Cultural</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de colores para Modo Claro y Oscuro automático */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-color: #3b82f6;
                --accent-hover: #60a5fa;
                --border-color: #334155;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        .profile-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            text-align: center;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* Avatar con efecto de destello de luz y gradiente animado continuo */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            /* Estiramos el degradado al 200% para poder desplazarlo y generar el efecto de brillo */
            background: linear-gradient(135deg, var(--accent-color), #ec4899, var(--accent-color));
            background-size: 200% 200%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
            animation: glowShift 6s ease-in-out infinite;
        }

        /* Animación fluida para simular el cambio de luz */
        @keyframes glowShift {
            0% {
                background-position: 0% 50%;
                box-shadow: 0 4px 14px rgba(37, 99, 235, 0.2);
            }
            50% {
                background-position: 100% 50%;
                /* El brillo de la sombra acompaña el tono predominante */
                box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
            }
            100% {
                background-position: 0% 50%;
                box-shadow: 0 4px 14px rgba(37, 99, 235, 0.2);
            }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* Redes Sociales */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 10px;
        }

        .social-icon {
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: color 0.2s ease, transform 0.2s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 28px 0;
        }

        /* Sección de Contacto Directo */
        .contact-section h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .contact-section p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .btn-contact {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background-color: var(--accent-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-contact:hover {
            background-color: var(--accent-hover);
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        /* Ficha de Datos Básicos Pie */
        .footer-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .footer-info p {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="avatar">DC</div>
        
        <h1>David Chapín</h1>
        <p class="tagline">Gestión Cultural. Perfil Digital & Profesional</p>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/soydavidchapin/" target="_blank" class="social-icon" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://x.com/davidchapin" target="_blank" class="social-icon" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/chapindavid/" target="_blank" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/davidchapin" target="_blank" class="social-icon" title="Facebook"><i class="fab fa-facebook"></i></a>
        </div>

        <hr>

        <div class="contact-section">
            <h2>¿Hablamos?</h2>
            <p>Haz clic abajo para enviarme un correo directamente desde tu aplicación de email predeterminada.</p>
            
            <a href="mailto:david@chapin.es?subject=Contacto%20desde%20la%20web&body=Hola%20David,%20me%20pongo%20en%20contacto%20contigo%20porque..." class="btn-contact">
                <i class="fas fa-envelope"></i> Enviar un correo electrónico
            </a>
        </div>

        <hr>

        <div class="footer-info">
            <p><i class="fas fa-at"></i> david@chapin.es</p>
            <p><i class="fas fa-globe"></i> david.chapin.es</p>
            <p style="margin-top: 14px; font-size: 0.75rem;">
                © <span id="current-year"></span> David Chapín. Todos los derechos reservados.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "1bfe56869739403bb2b1727539059bd6"}'></script></body>
</html>
